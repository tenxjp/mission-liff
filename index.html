<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>MISSION</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
</head>
<body>

<h2>予約</h2>
<iframe src="ここにhacomonoのURL" width="100%" height="600"></iframe>

<h2>会員証</h2>
<canvas id="qrcode"></canvas>

<script>
async function main() {
  await liff.init({ liffId: "あとで入れる" });

  if (!liff.isLoggedIn()) {
    liff.login();
    return;
  }

  const profile = await liff.getProfile();
  QRCode.toCanvas(document.getElementById('qrcode'), profile.userId);
}

main();
</script>

</body>
</html>
