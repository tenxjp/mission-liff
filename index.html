<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>MISSION TOKYO</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
  <p id="loadingMsg" style="text-align:center; margin-top:50px;">画面を移動しています...</p>

  <script>
    async function main() {
      // LIFF ID
      await liff.init({ liffId: "2009741389-2a51KXi2" });

      if (!liff.isLoggedIn()) {
        liff.login();
        return;
      }

      const params = new URLSearchParams(window.location.search);
      const page = params.get('p'); 

      // イベントの「準備中」表示設定
      if (page === 'event') {
        document.body.innerHTML = `
          <div style="text-align: center; margin-top: 100px; font-family: sans-serif;">
            <h2 style="color: #333;">イベント情報</h2>
            <p style="color: #666; margin-top: 20px;">現在準備中です。<br>公開までもうしばらくお待ちください！</p>
          </div>
        `;
        return;
      }

      // 基本のURL（ホーム）
      let targetUrl = "https://missionparkour.hacomono.jp/home"; 

      if (page === 'reserve') {
        // ① 予約画面
        targetUrl = "https://missionparkour.hacomono.jp/reserve/schedule/3/3"; 
      } else if (page === 'qr') {
        // ② 会員証（ホームを開く）
        targetUrl = "https://missionparkour.hacomono.jp/home"; 
      } else if (page === 'mypage') {
        // ③ マイページ
        targetUrl = "https://missionparkour.hacomono.jp/home"; 
      } else if (page === 'cancel') {
        // ④ キャンセル（予約確認）画面 ★ここを更新しました
        targetUrl = "https://missionparkour.hacomono.jp/activity"; 
      }

      window.location.replace(targetUrl);
    }

    main();
  </script>
</body>
</html>
