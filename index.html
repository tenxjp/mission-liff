<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>MISSION TOKYO</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
  <p style="text-align:center; margin-top:50px;">画面を移動しています...</p>

  <script>
    async function main() {
      // ▼ LIFF IDセット済み！
      await liff.init({ liffId: "2009741389-2a51KXi2" });

      if (!liff.isLoggedIn()) {
        liff.login();
        return;
      }

      const params = new URLSearchParams(window.location.search);
      const page = params.get('p'); 

      let targetUrl = "https://missionparkour.hacomono.jp/home"; 

      if (page === 'reserve') {
        // ① 予約画面
        targetUrl = "https://missionparkour.hacomono.jp/reserve/schedule/3/3"; 
      } else if (page === 'qr') {
        // ② 会員証（hacomono共通URLセット済み！）
        targetUrl = "https://missionparkour.hacomono.jp/member/membership-card"; 
      } else if (page === 'mypage') {
        // ③ マイページ（hacomono共通URLセット済み！）
        targetUrl = "https://missionparkour.hacomono.jp/home"; 
      } else if (page === 'event') {
        // ④ イベント（よく使われるURLを一旦入れています）
        targetUrl = "https://missionparkour.hacomono.jp/reserve/space/list"; 
      }

      window.location.replace(targetUrl);
    }

    main();
  </script>
</body>
</html>
