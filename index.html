<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>MISSION TOKYO</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
  <p style="text-align:center; margin-top:50px;">画面を移動しています...</p>

  <script>
    async function main() {
      // LIFF IDセット済み
      await liff.init({ liffId: "2009741389-2a51KXi2" });

      if (!liff.isLoggedIn()) {
        liff.login();
        return;
      }

      const params = new URLSearchParams(window.location.search);
      const page = params.get('p'); 

      // 基本のURL
      let targetUrl = "https://missionparkour.hacomono.jp/home"; 

      if (page === 'reserve') {
        // ① 予約画面
        targetUrl = "https://missionparkour.hacomono.jp/reserve/schedule/3/3"; 
      } else if (page === 'qr') {
        // ② 会員証（ホームを開いて下のボタンを押してもらう）
        targetUrl = "https://missionparkour.hacomono.jp/home"; 
      } else if (page === 'mypage') {
        // ③ マイページ
        targetUrl = "https://missionparkour.hacomono.jp/home"; 
      } else if (page === 'contract') {
        // ④ 契約・お手続きページ（hacomonoの標準URL）
        targetUrl = "https://missionparkour.hacomono.jp/member/contracts"; 
      } else if (page === 'event') {
        // イベント用（現在はホームに飛ぶ設定。URLが決まったらここを書き換えるだけ！）
        targetUrl = "https://missionparkour.hacomono.jp/home"; 
      }

      window.location.replace(targetUrl);
    }

    main();
  </script>
</body>
</html>
